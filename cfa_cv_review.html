<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA CV Review – v0.2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #f0efe9;
    --text: #1a1918;
    --text2: #6b6a66;
    --text3: #9e9c97;
    --border: rgba(26,25,24,0.12);
    --border2: rgba(26,25,24,0.22);
    --radius: 10px;
    --radius-sm: 6px;
    --green: #2d7d46;
    --green-bg: #eaf3de;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --font: 'Georgia', 'Times New Roman', serif;
    --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1b1a;
      --bg2: #252421;
      --bg3: #2e2c2a;
      --text: #f0ede8;
      --text2: #a09e99;
      --text3: #706e6a;
      --border: rgba(240,237,232,0.1);
      --border2: rgba(240,237,232,0.2);
      --green: #97c459;
      --green-bg: #173404;
      --amber: #ef9f27;
      --amber-bg: #412402;
      --red: #f09595;
      --red-bg: #501313;
      --blue: #85b7eb;
      --blue-bg: #042c53;
    }
  }

  body {
    font-family: var(--sans);
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    line-height: 1.6;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  /* Header */
  .site-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .logo-block {}
  .logo-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--blue);
    background: var(--blue-bg);
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .site-title {
    font-family: var(--font);
    font-size: 24px;
    font-weight: normal;
    color: var(--text);
    line-height: 1.25;
  }
  .site-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }
  .skill-link {
    font-size: 11px;
    color: var(--text3);
    text-decoration: none;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 1px;
    margin-top: 4px;
    display: inline-block;
    white-space: nowrap;
  }
  .skill-link:hover { color: var(--text2); }

  /* API key section */
  .api-section {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.6rem 0.75rem;
    margin-bottom: 1rem;
  }
  .api-section-title { display: none; }
  .api-note { display: none; }
  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .api-row input {
    flex: 1;
    font-family: monospace;
    font-size: 13px;
    padding: 8px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .api-row input:focus { border-color: var(--text3); }
  .btn-sm {
    font-size: 12px;
    padding: 8px 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-sm:hover { background: var(--bg3); }
  .api-note {
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
    line-height: 1.5;
  }
  .api-note a { color: var(--text3); }

  /* Upload */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 1.75rem 1.25rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 1.25rem;
    position: relative;
  }
  .upload-zone:hover { background: var(--bg2); border-color: var(--text3); }
  .upload-zone.drag { background: var(--bg2); border-color: var(--text2); }
  .upload-zone.has-file { border-style: solid; border-color: var(--green); background: var(--green-bg); }
  #file-input { display: none; }
  .upload-icon { font-size: 24px; margin-bottom: 7px; }
  .upload-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .upload-sub { font-size: 11px; color: var(--text2); }
  .upload-fname { font-size: 13px; font-weight: 500; color: var(--green); margin-top: 8px; }

  /* Form fields */
  .fields-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    font-size: 13px;
    padding: 9px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--text3); }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: var(--sans);
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.82; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg2);
    border: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    margin-top: 1rem;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--red-bg);
    border: 0.5px solid var(--red);
    font-size: 13px;
    color: var(--red);
    margin-top: 1rem;
    line-height: 1.6;
  }

  /* Results */
  .results { margin-top: 2.5rem; }
  .sec-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }
  .divider { height: 0.5px; background: var(--border); margin: 2rem 0; }

  /* Score header */
  .score-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 1.5rem;
  }
  .score-big {
    font-family: var(--font);
    font-size: 56px;
    font-weight: normal;
    line-height: 1;
  }
  .score-meta { font-size: 13px; color: var(--text2); }
  .verdict-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }

  /* Dimension grid */
  .dim-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .dim-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .dim-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .dim-name { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.02em; }
  .dim-wt { font-size: 11px; color: var(--text3); }
  .dim-score { font-size: 26px; font-weight: 500; font-family: var(--font); }
  .dim-bar-bg { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .dim-bar { height: 3px; border-radius: 2px; }
  .dim-note { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.55; }

  /* Prose blocks */
  .prose-block {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 10px;
  }
  .prose-block h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }
  .prose-block ul { padding-left: 1.1rem; }
  .prose-block li {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 6px;
  }

  /* Priority list */
  .priority-list { list-style: none; padding: 0; }
  .priority-item { display: flex; gap: 14px; margin-bottom: 14px; }
  .pri-num {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    min-width: 22px;
    border-radius: 50%;
    background: var(--text);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    margin-top: 2px;
  }
  .pri-text { font-size: 13px; color: var(--text2); line-height: 1.65; }
  .pri-text strong { color: var(--text); font-weight: 600; }
  .pri-section { font-size: 11px; color: var(--text3); display: inline-block; margin-top: 2px; }

  /* Summary */
  .summary-box {
    border-left: 3px solid var(--border2);
    padding: 1rem 1.25rem;
    background: var(--bg2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom: 12px;
  }
  .summary-box p { font-size: 14px; color: var(--text2); line-height: 1.75; font-family: var(--font); }

  /* Facts */
  .fact-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .fact-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text2);
    border: 0.5px solid var(--border);
  }
  .fact-row { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .fact-row strong { color: var(--text); font-weight: 600; }
  .warn-text { color: var(--amber); }

  /* Skill version banner */
  .skill-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--blue-bg);
    border: 0.5px solid var(--blue);
    margin-bottom: 1.5rem;
    font-size: 12px;
    color: var(--blue);
  }
  .skill-banner a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 0.5px solid currentColor;
  }
  .skill-banner a:hover { opacity: 0.75; }
  .skill-banner-sep { opacity: 0.35; margin: 0 2px; }

  /* Diagnostics panel */
  .diag-toggle {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 1.5rem;
    display: block;
    font-family: var(--sans);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .diag-toggle:hover { color: var(--text2); }
  .diag-panel {
    margin-top: 0.75rem;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem;
    font-size: 11px;
    font-family: monospace;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }
  .diag-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; border-bottom: 0.5px solid var(--border); }
  .diag-row:last-child { border-bottom: none; }
  .diag-key { color: var(--text3); }
  .diag-val { color: var(--text); font-weight: 600; }
  .diag-warn { color: var(--amber); font-weight: 600; }
  .diag-ok { color: var(--green); font-weight: 600; }

  /* Copy btn */
  .btn-copy {
    font-size: 12px;
    padding: 8px 14px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    margin-top: 1.5rem;
    font-family: var(--sans);
  }
  .btn-copy:hover { background: var(--bg2); }
  .btn-copy.copied { color: var(--green); border-color: var(--green); }

  /* Color helpers */
  .c-green { color: var(--green); }
  .c-amber { color: var(--amber); }
  .c-red { color: var(--red); }
  .bar-green { background: var(--green); }
  .bar-amber { background: var(--amber); }
  .bar-red { background: var(--red); }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-red { background: var(--red-bg); color: var(--red); }

  @media (max-width: 560px) {
    .page { padding: 2rem 1rem 4rem; }
    .fields-row { grid-template-columns: 1fr; }
    .dim-grid { grid-template-columns: 1fr; }
    .site-header { flex-direction: column; gap: 12px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div class="logo-block">
      <div class="logo-badge">CFA Society Switzerland &middot; Careers Committee</div>
      <h1 class="site-title">CV Review &ndash; v0.2</h1>
      <p class="site-sub">Six-dimension analysis calibrated to Swiss financial industry norms</p>
    </div>
    <div style="text-align:right;margin-top:4px;">
      <a class="skill-link" href="https://github.com/Amarows/cfa_skills/blob/main/skills/cv_review_generic/SKILL.md" target="_blank">SKILL.md &rarr;</a>
    </div>
  </header>

  <!-- Access Password -->
  <div class="api-section">
    <div class="api-section-title">Access Password</div>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="Enter password" autocomplete="off">
      <button class="btn-sm" onclick="toggleKey()">Show</button>
    </div>
    <p class="api-note">Contact the Careers Committee for access.</p>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">&#128196;</div>
    <div class="upload-label">Drop CV here or click to browse</div>
    <div class="upload-sub">PDF &middot; DOCX &middot; max 10 MB</div>
    <div class="upload-fname" id="upload-fname" style="display:none"></div>
    <input type="file" id="file-input" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
  </div>

  <!-- Optional fields -->
  <div class="fields-row">
    <div class="field">
      <label style="opacity:0.45;">Client&rsquo;s stated goal <span style="font-size:10px;font-weight:500;color:var(--amber);background:var(--amber-bg,#fff8e6);border:0.5px solid var(--amber);border-radius:3px;padding:1px 5px;margin-left:4px;">Under development</span></label>
      <input type="text" id="client-goal" placeholder="Under development" disabled style="opacity:0.4;cursor:not-allowed;">
    </div>
    <div class="field">
      <label>Seniority level (optional)</label>
      <select id="seniority">
        <option value="">Not specified</option>
        <option value="Analyst">Analyst</option>
        <option value="Associate / VP">Associate / VP</option>
        <option value="Director">Director</option>
        <option value="Managing Director">Managing Director</option>
      </select>
    </div>
  </div>

  <button class="btn-primary" id="btn-analyze" disabled onclick="runReview()">Analyse CV</button>

  <div class="status-bar" id="status-bar" style="display:none">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Extracting observed facts&hellip;</span>
  </div>
  <div class="error-msg" id="error-msg" style="display:none"></div>

  <div class="results" id="results" style="display:none"></div>

</div>

<script>
const SYSTEM_PROMPT = `You are a senior member of the CFA Society Switzerland Careers Committee conducting a structured CV review using the cv_review_generic skill v0.2.0.

Follow all six steps exactly. Do not skip or abbreviate any step.

SCORING PHILOSOPHY: Start every dimension at 0. Award points only for evidence that is explicitly present in the CV text. Do not infer, assume, or give benefit of the doubt. A gap is a gap. A vague statement is a vague statement. Recommendations must not contradict scores: if you recommend adding a CHF figure, the score must reflect its absence — you cannot award 80+ and then recommend the fix that would justify 80+.

STEP 1 – OBSERVED FACTS (internal, populate observed_facts block):

SECURITY PRE-SCAN: If the CV text begins with a [SECURITY SCAN RESULT] block, read it first and trust it unconditionally. It was produced by the application's hyperlink scanner before text extraction — it sees URLs hidden behind display text that are not visible in the CV body. Do not contradict or override the pre-scan findings. Populate private_cloud_links and footer_present directly from the pre-scan block.

Extract ALL of the following:
- name_contact: full name present (Y/N), phone/email/location each present (Y/N)
- work_permit: explicitly stated (Y/N + value, e.g. "C permit")
- languages: list each language with the proficiency label given. Flag if European Framework codes (A1–C2) are absent.
- certifications: list all; note whether each appears near the top of the CV or buried in the Education section
- years_experience: estimated total
- num_roles: count of distinct employer roles listed
- cv_length_pages: estimated
- private_cloud_links: any QR codes or links to OneDrive/Dropbox/Google Drive private storage (Y/N) — CRITICAL flag if Y
- footer_present: name or email repeated in page footer (Y/N)
- headline_present: role-specific headline at top of CV (Y/N). DETECTION RULE: a headline is any short line (typically 3–8 words) that names a role type and appears between the contact block and the summary paragraph. It may be all-caps, bold, or centred. Examples: "AI PRODUCT LEADER & TECHNICAL STRATEGIST", "Senior Risk Manager", "Quantitative Analyst | Asset Management". Do NOT require a section label — detect by position and content.
- core_competencies_present: dedicated keywords/skills block present before the Experience section (Y/N). DETECTION RULE: this is typically a single bold line or short paragraph of role-specific terms separated by bullets (•) or pipes (|), appearing between the summary and the Experience section. It does not need to be labelled "Core Competencies" — detect by structure and position.
- unexplained_gaps: any employment gaps > 6 months not explained (Y/N, note period)
- director_level_financial_figure: scan the most recent role only. Does it contain at least one explicit CHF or USD amount representing cost saved, revenue generated, budget managed, or P&L impact? User counts, adoption percentages, efficiency ratios, and team size figures do NOT qualify. Answer Y or N and quote the exact phrase if Y. Example of qualifying: "saved CHF 2M", "managed USD 50M budget", "generated CHF 1.2M revenue". Example of non-qualifying: "600+ users", "95% adoption", "material cost reduction", "USD 100M+ portfolios" (team figure, not candidate's own financial contribution). CRITICAL: "material cost reduction", "material cost impact", "significant cost savings", "cost efficiencies achieved" are ALL non-qualifying — they are vague phrases without a number. If the only financial language in the most recent role is one of these phrases, the answer is N.
- format_issues: mixed fonts, text boxes, shaded backgrounds, double section separators (describe or "none")

ANTI-HALLUCINATION GATE: Do not proceed to Step 2 if CV text was not fully readable. State the gap and stop.

D1 SENIORITY CEILING GATE: Before scoring D1, read the value of director_level_financial_figure from Step 1.
- If director_level_financial_figure = N: D1 maximum is 60. You must not award more than 60 regardless of any other evidence. This is a hard cap, not a guideline.
- If director_level_financial_figure = Y: ceiling does not apply; score normally.
Record this gate result in your reasoning before computing D1.

PRE-SCORE EVIDENCE REQUIREMENT: Before assigning any score above 60 on any dimension, you must list in your internal reasoning (not in the output JSON) the specific CV bullets or sections that justify that score. If you cannot list them, the score must be 60 or below.

STEP 2 – SCORING (0–100 per dimension, EXACT weights below — do not deviate):

DIMENSION 1 – Achievement Clarity and Evidence — weight 0.25

Score additively. Start at 0.

BASE SCORE — count explicitly, do not estimate:
+10 pts: every role in the last 10 years has at least one structured bullet point (a line beginning with a dash, bullet symbol, or bold label). If even one role in the last 10 years has only paragraphs and no bullets, do not award these points. Max 10 pts.
+10 pts: at least 2 roles in the last 10 years have structured bullets. Max 10 pts (combined with above = 20 pts max for bullet structure).
+30 pts: count all structured bullets across roles in the last 10 years. If 50% or more of those bullets contain at least one specific numeric figure (%, number, USD/CHF amount, named timeframe), award +30 pts. If 25–49% contain a numeric figure, award +15 pts. If fewer than 25% contain a numeric figure, award 0 pts.
+20 pts: at least one bullet in the most recent role meets ALL FOUR Karol elements simultaneously in a single bullet: (a) the candidate's specific named action or decision, (b) a financial figure or measurable outcome expressed as a number, (c) an explicit reason or business context for the action, (d) a named impact on the firm, client, or stakeholders. All four must be present in one bullet — partial credit is not awarded.
+20 pts: at least 3 bullets across the last 10 years include an explicit reason clause — a phrase explaining WHY the work was done (e.g. "to enable...", "following the merger...", "in response to..."). Generic role descriptions without a reason clause do not qualify.

HARD DEDUCTIONS — apply each that is present, no discretion:
-15 pts: "material cost reduction" without a CHF or USD figure in the same sentence. Apply once.
-15 pts: "superior product performance" or "significant efficiency gain" or "improved processes" or "streamlined workflows" without a numeric figure. Apply once per distinct phrase, max –30 pts total for this category.
-10 pts: a financial figure (USD, CHF, AUM, portfolio size) is stated but attributed to a team, firm, or product rather than to the candidate's own action or decision. Apply once per such figure, max –20 pts total.
-10 pts: "300%+ fund performance" or similar fund/portfolio return figure without a sentence specifying the candidate's individual role in generating that return. Apply once.
-15 pts: the most recent role opens with TWO OR MORE sentences of narrative prose before any structured bullets. A single short sentence of role context (one line, under 30 words) does not trigger this deduction. The deduction applies when the opening block is a full paragraph or more that describes responsibilities, scope, or background rather than leading directly into achievement bullets.
-10 pts per distinct filler phrase found anywhere in the document: "responsible for", "strong leadership", "excellent communication skills", "deep understanding of", "results-oriented". Count each phrase once regardless of how many times it appears. Max –30 pts for this category.

SENIORITY CEILING — mandatory, enforced by gate computed in Step 1:
If director_level_financial_figure = N: cap D1 at 60. Do not exceed this regardless of base score or deductions.
If the most recent role is described entirely in paragraphs without any structured bullets: cap D1 at 45.
Apply the lower of the two caps if both conditions are true.

FLOOR: minimum score is 0 (negative arithmetic does not go below 0).

DIMENSION 2 – Swiss Market Fit — weight 0.15

Score additively. Start at 0. Award exactly the points stated — no partial credit except where noted.

+20 pts: work permit status explicitly stated in contact section (e.g. "Work Permit: C")
+20 pts: languages listed WITH European Framework levels (A1–C2) — text labels like "Professional level" or "Native" WITHOUT a framework code score 0 for this criterion; award +10 pts only if text label is present but no framework code
+20 pts: Swiss employer name or Swiss regulatory context (FINMA, SNB, Swiss GAAP FER, SIX) referenced in experience body
+20 pts: location in Switzerland stated in contact details
+20 pts: date of birth AND nationality BOTH absent from the document

HARD DEDUCTIONS (D2):
-10 pts: QR code or private cloud link present (cybersecurity signal). This is the ONLY deduction applied in D2 for this issue — maximum -10 pts regardless of severity. Do not apply any additional undocumented deductions. The private cloud link is already penalised fully in D7; D2 applies only this single -10 pt adjustment.
-10 pts: date of birth OR nationality present (deduct -10 for each one present, independently).

DIMENSION 3 – Financial Industry Signals — weight 0.15

Score additively. Start at 0.

+25 pts: relevant certifications (CFA, FRM, CAIA, CIIA, AZEK, PRM) present AND prominently placed. Prominent placement includes: (a) appended directly to the candidate's name in the header (e.g. "Alexey Malashonak, CFA, FRM") — this is the most prominent possible placement and always qualifies for full points; (b) a dedicated Certifications section appearing before or immediately after the contact block. Award +15 pts only if certifications are present solely in the Education section with no mention elsewhere.
DEFINITION — "experience body": a sentence or bullet point inside a dated work role section (under a company name and date range). A dedicated Skills, Technological Expertise, Technical Skills, Tools, or Competencies section is NOT experience body — it is a skills table. Frameworks or platforms mentioned only in a skills table do not qualify for D3 points, regardless of how many items the table contains.

+25 pts: financial products, asset classes, or regulatory frameworks named in the experience body (Basel II/III/IV, IFRS, ISDA, CVA/DVA, PFE, FINMA, GRI, Swiss GAAP FER, PD/LGD/EAD, CCR, GIPS). To qualify: the framework must appear inside a dated role section, in a sentence describing actual work performed. A framework listed only in the Skills or Technological Expertise section does not qualify.
+15 pts: at least one of the following platforms or tools is named inside a dated role section in a sentence describing actual work performed: Bloomberg, Murex, Calypso, FactSet, RiskMetrics, Refinitiv, Eikon, MicroStrategy, SAS, Databricks, Power BI, Temenos, Finastra, MSCI, Axioma, Sophis, Numerix, OpenPages, Riskonnect, FIS, Misys, SimCorp, Charles River, Aladdin, Markit, IHS Markit, MSCI Barra, Quantifi, Openlink, Allegro. A tool appearing only in the Skills or Technological Expertise section does NOT qualify — award 0 pts for this criterion if no qualifying tool appears in a dated role section.
+10 pts: a dedicated section named Skills, Technical Skills, Technological Expertise, Tools, Competencies, or similar is present AND contains 5 or more distinct named items. This is the only criterion that credits the skills table directly.

HARD DEDUCTIONS (D3):
-0 pts: no additional deduction beyond the +15 vs +25 distinction above. Do not deduct separately for placement.

DIMENSION 4 – Positioning and Professional Identity — weight 0.15

Score additively. Start at 0.

+25 pts: role-specific headline present at the top of the CV (not just name + credentials). Headline must name a role type, not be a generic label.
+25 pts: summary section is 60–90 words, focused on the top 2–3 achievements with at least one specific evidence item (figure, named product, named employer outcome). Award +15 pts if summary present but 91–120 words or lacks a specific evidence item. Award 0 pts if summary absent or >120 words.
+25 pts: dedicated core competencies or key skills block present with 3–5 targeted, role-specific keywords. Award 0 pts if the block is a generic list of soft skills without role-specific terms.
+25 pts: no repetition of the same content across three or more sections (Summary, Core Competencies, and Experience must each add new information).

HARD DEDUCTIONS — apply each occurrence:
-10 pts per filler phrase in summary or headline: "proven track record", "strong foundation in", "results-oriented", "passionate about", "dynamic professional", "deep understanding of" (unless immediately followed by a specific named example).
-15 pts: summary opening sentence exceeds 50 words.
-20 pts: no headline present at Director/MD level. Apply the same detection rule as Step 1: a headline is any short role-type line between the contact block and the summary, regardless of formatting. Do NOT apply this deduction if a headline is present but not in a specific expected format.

DIMENSION 5 – Structure and Readability — weight 0.15

Score additively. Start at 0.

+20 pts: strict reverse chronological order throughout with consistent date format (MM/YYYY or Month YYYY — not mixed)
+20 pts: appropriate length for experience level: under 10 years = 1–2 pages; 10–20 years = 2–3 pages; over 20 years = max 3 pages
+20 pts: early career handled correctly — roles from more than 15 years ago listed without bullet descriptions; no primary or secondary school listed if candidate is over 35
+20 pts: clean header — no "Curriculum Vitae" title, no signature or date at bottom, no name/email repeated in footer
+20 pts: no unexplained employment gaps greater than 6 months

HARD DEDUCTIONS:
-15 pts: unexplained gap greater than 6 months (deduct for each gap, max -30 pts)
-10 pts: name or email repeated in page footer
-10 pts: "Curriculum Vitae" present as document title
-10 pts: signature or date present at document bottom
-10 pts: Professional Development section lists more than 8 entries or includes entries older than 10 years without clear relevance

DIMENSION 6 – Language and Tone — weight 0.05

Score additively. Start at 0.

+25 pts: 75% or more of all structured bullets in the document open with a strong action verb (Led, Built, Designed, Delivered, Reduced, Increased, Managed, Developed, Architected, Drove, Implemented, Created, Launched). Count bullets and compute the percentage — do not estimate.
+25 pts: no first-person pronouns (I, my, we, our) found anywhere in the document. Binary — present anywhere = 0 pts.
+25 pts: no grammar or spelling errors detectable from the extracted text. Binary.
+25 pts: the phrase "References available upon request" or "References on request" is absent. Binary.

HARD DEDUCTIONS — count each DISTINCT phrase once per document regardless of how many times it appears. Do not count the same phrase twice.
List of penalised phrases and their deductions:
- "proven track record": –10 pts (count once even if it appears 3 times)
- "strong foundation in": –10 pts (count once)
- "results-oriented": –10 pts (count once)
- "passionate about": –10 pts (count once)
- "dynamic professional": –10 pts (count once)
- "deep understanding of": –10 pts (count once)
- "strong track record of delivering": –10 pts (count once)

HARD CAP on filler deductions: maximum total deduction from filler phrases is –30 pts. If three or more phrases are present, still deduct only –30 pts total.

-5 pts: "Design and photo experience" or a similarly vague personal interest listed in Additional Information without any stated relevance to a financial services role. Apply once.

DIMENSION 7 – Document Hygiene and Modern Formatting — weight 0.10

Score additively. Start at 0. Award exactly the points stated.

+20 pts: single font family used throughout (sans-serif preferred — Arial, Calibri, Helvetica)
+20 pts: no QR codes anywhere in the document
+20 pts: no links to private cloud storage (OneDrive personal, Dropbox, Google Drive private) — use the [SECURITY SCAN RESULT] block as the authoritative source for DOCX files, as hyperlink destinations are invisible in extracted text. If the pre-scan flagged a private cloud link, this criterion scores 0 and D7 total scores 0 with a mandatory red flag at the top of the output. For PDF input where no pre-scan block is present, assess from visible URLs in the text. Only acceptable external link is a fully written LinkedIn profile URL.
+20 pts: no filled or shaded section backgrounds
+20 pts: section separators are single lines only (not double lines, not thick borders)

WEIGHTED OVERALL SCORE = D1×0.25 + D2×0.15 + D3×0.15 + D4×0.15 + D5×0.15 + D6×0.05 + D7×0.10
Compute this exactly from your dimension scores. Do not round intermediate values. Report this value in weighted_score.

STEP 3 – Per-dimension commentary:
For each of the 7 dimensions: 1–2 sentences on what is done well (grounded in observed facts only — no inferred positives) + 2–3 specific actionable recommendations each referencing the exact CV section. CONSISTENCY RULE: if a recommendation says "add X", the dimension score must reflect the absence of X. If you awarded full points for something, do not recommend adding it.

STEP 4 – Triage block:
Strengths: 3–5 observable positives grounded in specific CV content
Weaknesses: 3–5 specific gaps, each referencing a section and the points lost
Missing sections recommended: sections absent but expected for this seniority

STEP 5 – Top 3 priority recommendations ranked by expected impact on interview conversion.
Format: action | why it matters | specific section to edit.
If a private cloud link (QR/OneDrive/Dropbox) is present, that is ALWAYS Priority 1.
Priority 1 should almost always address D1 Achievement Clarity unless a cybersecurity red flag is present.

STEP 6 – 3–5 sentence client-ready summary. Constructive and direct. Do not inflate. If the CV significantly undersells the candidate, say so explicitly. Do not describe the CV as "strong" unless the weighted score is 75 or above.

function loadFile(file) {
  clearError();
  if (file.size > 10 * 1024 * 1024) { showError('File exceeds 10 MB limit.'); return; }
  const isPdf = file.type === 'application/pdf' || file.name.endsWith('.pdf');
  const isDocx = file.name.endsWith('.docx') || file.type.includes('wordprocessingml');
  if (!isPdf && !isDocx) { showError('Only PDF and DOCX files are accepted.'); return; }

  // Reset previous state
  cvBase64 = null;
  cvMediaType = null;
  cvTextContent = null;

  const reader = new FileReader();

  if (isPdf) {
    cvMediaType = 'application/pdf';
    reader.onload = e => {
      cvBase64 = e.target.result.split(',')[1];
      setFileUploaded(file);
    };
    reader.readAsDataURL(file);
  } else {
    // DOCX: extract via mammoth HTML (preserves hyperlinks), scan for issues, then strip to plain text
    reader.onload = e => {
      const arrayBuffer = e.target.result;
      mammoth.convertToHtml({ arrayBuffer })
        .then(result => {
          if (!result.value || result.value.trim().length < 50) {
            showError('Could not extract text from this DOCX file. Please try converting to PDF.');
            return;
          }

          const html = result.value;

          // --- SECURITY SCAN: detect private cloud links before stripping HTML ---
          const privatePatterns = [
            /https?:\/\/d\.docs\.live\.net\//i,
            /https?:\/\/onedrive\.live\.com\//i,
            /https?:\/\/1drv\.ms\//i,
            /https?:\/\/www\.dropbox\.com\//i,
            /https?:\/\/dl\.dropboxusercontent\.com\//i,
            /https?:\/\/drive\.google\.com\/(?!.*[?&]usp=sharing)/i,
          ];
          const qrPattern = /qr[\s_-]?code|data:image\/(png|jpeg|gif)/i;

          let detectedPrivateUrl = null;
          for (const pat of privatePatterns) {
            const m = html.match(pat);
            if (m) { detectedPrivateUrl = m[0]; break; }
          }
          const hasQr = qrPattern.test(html);

          // --- FOOTER SCAN: detect name/email repeated in last 200 chars of plain text ---
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const plainText = doc.body.innerText || doc.body.textContent || '';
          const lastChunk = plainText.slice(-300).toLowerCase();
          const footerKeywords = ['@', 'protonmail', 'gmail', 'outlook', 'yahoo'];
          const hasFooter = footerKeywords.some(k => lastChunk.includes(k));

          // --- BUILD ANNOTATED TEXT FOR MODEL ---
          // Prepend a security context block so the model sees the findings
          let securityBlock = '';
          if (detectedPrivateUrl) {
            securityBlock += `[SECURITY SCAN RESULT] Private cloud link detected in document hyperlinks: ${detectedPrivateUrl}\n`;
            securityBlock += `This link is hidden behind display text and not visible in the CV body. It constitutes a private cloud link as defined in D7. Set private_cloud_links to "Y - detected: ${detectedPrivateUrl}" and D7 score must be 0.\n\n`;
          }
          if (hasQr) {
            securityBlock += `[SECURITY SCAN RESULT] QR code or embedded image detected. Set private_cloud_links to "Y - QR code present" if a QR code is confirmed.\n\n`;
          }
          if (hasFooter) {
            securityBlock += `[SECURITY SCAN RESULT] Page footer detected: name or email appears to repeat at the bottom of the document. Set footer_present to "Y".\n\n`;
          }
          if (!securityBlock) {
            securityBlock = `[SECURITY SCAN RESULT] No private cloud links, QR codes, or footer issues detected by pre-scan.\n\n`;
          }

          cvTextContent = securityBlock + 'CV TEXT (extracted from DOCX):\n\n' + plainText;
          setFileUploaded(file);
        })
        .catch(err => {
          showError('Failed to read DOCX: ' + esc(err.message) + '. Try converting to PDF.');
        });
    };
    reader.readAsArrayBuffer(file);
  }
}

const SKILL_NAME = 'cv_review_generic';

const MODEL_ID = 'claude-opus-4-8';
// Issue #17: cache_control on the system block caches the full rubric prefix
// (~5.6k tokens, above the model's cacheable minimum); reads cost ~0.1x for
// 5 minutes after each use.
const CACHED_SYSTEM = [{ type: 'text', text: SYSTEM_PROMPT, cache_control: { type: 'ephemeral' } }];

// Issue #17: seed the cache before the first real review. max_tokens: 0 runs
// prefill only — writes the cache, bills no output tokens.
let prewarmed = false;
function prewarmCache(apiKey) {
  if (prewarmed) return;
  prewarmed = true;
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model: MODEL_ID, max_tokens: 0, system: CACHED_SYSTEM, messages: [{ role: 'user', content: 'warmup' }] })
  }).catch(() => { prewarmed = false; });
}

const PHASES = [
  'Extracting observed facts from CV\u2026',
  'Scoring six dimensions\u2026',
  'Generating per-dimension recommendations\u2026',
  'Composing priority actions and summary\u2026'
];

async function runReview() {
  const entered = document.getElementById('api-key').value.trim();
  const apiKey = ACCESS_KEYS[entered];
  if (!apiKey) { showError('Incorrect password.'); return; }
  if (!cvBase64 && !cvTextContent) return;
  clearError();
  btnAnalyze.disabled = true;
  document.getElementById('results').style.display = 'none';

  const goal = document.getElementById('client-goal').value.trim();
  const seniority = document.getElementById('seniority').value;
  const ctx = [goal ? 'Client stated goal: ' + goal + '.' : '', seniority ? 'Seniority level: ' + seniority + '.' : ''].filter(Boolean).join(' ');

  let phaseIdx = 0;
  setStatus(PHASES[0]);
  const phaseTimer = setInterval(() => {
    phaseIdx = (phaseIdx + 1) % PHASES.length;
    setStatus(PHASES[phaseIdx]);
  }, 4000);

  try {
    // Build content block: PDF uses native document type; DOCX uses extracted text
    const cvContentBlock = cvBase64
      ? { type: 'document', source: { type: 'base64', media_type: cvMediaType, data: cvBase64 } }
      : { type: 'text', text: cvTextContent };

    const body = {
      model: MODEL_ID,
      max_tokens: 2048,
      system: CACHED_SYSTEM,
      messages: [{
        role: 'user',
        content: [
          cvContentBlock,
          {
            type: 'text',
            text: 'Please review this CV according to the cv_review_generic skill. ' + ctx + ' Return only the JSON object.'
          }
        ]
      }]
    };

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });

    clearInterval(phaseTimer);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err.error?.message || ('API error ' + res.status);
      if (res.status === 401) throw new Error('Invalid API key. Please check your key at console.anthropic.com.');
      if (res.status === 400 && msg.includes('document')) throw new Error('The file format could not be parsed by the API. Try converting to PDF and re-uploading.');
      throw new Error(msg);
    }

    const data = await res.json();
    lastUsage = data.usage || null;
    const raw = (data.content || []).map(b => b.type === 'text' ? b.text : '').join('').trim();
    const clean = raw.replace(/^```json\s*/i, '').replace(/^```/, '').replace(/```$/, '').trim();
    const result = JSON.parse(clean);

    setStatus('Analysis complete.', false);
    renderResults(result);

  } catch (err) {
    clearInterval(phaseTimer);
    document.getElementById('status-bar').style.display = 'none';
    showError('<strong>Error:</strong> ' + esc(err.message));
    btnAnalyze.disabled = false;
  }
}

function scoreColor(s) { return s >= 70 ? 'green' : s >= 45 ? 'amber' : 'red'; }

function verdict(s) {
  if (s >= 75) return ['Strong', 'green'];
  if (s >= 60) return ['Satisfactory', 'amber'];
  if (s >= 45) return ['Needs Work', 'amber'];
  return ['Requires Significant Revision', 'red'];
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderResults(r) {
  lastResult = r;
  const dimOrder = ['achievement_clarity', 'swiss_market_fit', 'financial_industry_signals', 'positioning_identity', 'structure_readability', 'language_tone', 'document_hygiene'];
  // Always display the locally recomputed score; model arithmetic is not trusted
  const wsModel = typeof r.weighted_score === 'number' ? r.weighted_score : 0;
  const ws = dimOrder.reduce((sum, k) => {
    const d = r.scores[k] || {};
    return sum + (typeof d.score === 'number' ? d.score : 0) * (parseFloat(DIM_WEIGHTS[k]) / 100);
  }, 0);
  const wsDrift = Math.abs(ws - wsModel);
  const [vLabel, vColor] = verdict(ws);

  let h = '';

  // Skill version banner
  const now = new Date();
  const ts = now.toISOString().slice(0,10) + '\u00a0' + now.toTimeString().slice(0,5);
  h += `<div class="skill-banner">
    <span>Evaluated using</span>
    <a href="${SKILL_URL}" target="_blank">${esc(SKILL_NAME)}</a>
    <span class="skill-banner-sep">|</span>
    <span>v${esc(SKILL_VERSION)}</span>
    <span class="skill-banner-sep">|</span>
    <span>${ts}</span>
  </div>`;

  // Red flag: private cloud link
  const f = r.observed_facts || {};
  if (f.private_cloud_links && f.private_cloud_links.startsWith('Y')) {
    h += `<div class="error-msg" style="display:block;margin-bottom:1rem;">
      <strong>&#9888; CYBERSECURITY RED FLAG</strong> – Private cloud link detected (OneDrive / Dropbox / Google Drive personal). Document Hygiene score is 0. This must be corrected before submission to any employer.
    </div>`;
  }

  h += `<div class="sec-label">Overall Score</div>
  <div class="score-header">
    <div class="score-big c-${scoreColor(ws)}">${ws.toFixed(1)}</div>
    <div class="score-meta">out of 100<br><span class="verdict-pill pill-${vColor}">${esc(vLabel)}</span></div>
  </div>
  <div class="divider"></div>`;

  // Dimension grid
  h += `<div class="sec-label">Seven-Dimension Breakdown</div><div class="dim-grid">`;
  dimOrder.forEach(k => {
    const d = r.scores[k] || {};
    const s = typeof d.score === 'number' ? d.score : 0;
    const c = scoreColor(s);
    h += `<div class="dim-card">
      <div class="dim-top"><span class="dim-name">${esc(DIM_LABELS[k])}</span><span class="dim-wt">${DIM_WEIGHTS[k]}</span></div>
      <div class="dim-score c-${c}">${s}</div>
      <div class="dim-bar-bg"><div class="dim-bar bar-${c}" style="width:${s}%"></div></div>
      <div class="dim-note">${esc(d.strengths || '')}</div>
    </div>`;
  });
  h += `</div><div class="divider"></div>`;

  // Triage block
  const triage = r.triage || {};
  const strengths = Array.isArray(triage.strengths) ? triage.strengths : [];
  const weaknesses = Array.isArray(triage.weaknesses) ? triage.weaknesses : [];
  const missing = Array.isArray(triage.missing_sections) ? triage.missing_sections : [];
  if (strengths.length || weaknesses.length || missing.length) {
    h += `<div class="sec-label">Triage</div><div class="dim-grid" style="grid-template-columns:1fr 1fr 1fr;">`;
    h += `<div class="prose-block"><h3>Strengths</h3><ul>`;
    strengths.forEach(s => { h += `<li>${esc(s)}</li>`; });
    h += `</ul></div>`;
    h += `<div class="prose-block"><h3>Weaknesses</h3><ul>`;
    weaknesses.forEach(s => { h += `<li>${esc(s)}</li>`; });
    h += `</ul></div>`;
    h += `<div class="prose-block"><h3>Missing Sections</h3><ul>`;
    if (missing.length) { missing.forEach(s => { h += `<li>${esc(s)}</li>`; }); }
    else { h += `<li style="color:var(--text3)">None identified</li>`; }
    h += `</ul></div>`;
    h += `</div><div class="divider"></div>`;
  }

  // Per-dimension recommendations
  h += `<div class="sec-label">Per-Dimension Recommendations</div>`;
  dimOrder.forEach(k => {
    const d = r.scores[k] || {};
    const recs = Array.isArray(d.recommendations) ? d.recommendations : [];
    if (!recs.length) return;
    h += `<div class="prose-block"><h3>${esc(DIM_LABELS[k])}</h3><ul>`;
    recs.forEach(rec => { h += `<li>${esc(rec)}</li>`; });
    h += `</ul></div>`;
  });
  h += `<div class="divider"></div>`;

  // Priority recommendations
  h += `<div class="sec-label">Priority Recommendations</div><div class="prose-block"><ol class="priority-list">`;
  (r.priority_recommendations || []).forEach((item, i) => {
    h += `<li class="priority-item">
      <div class="pri-num">${i + 1}</div>
      <div class="pri-text"><strong>${esc(item.action)}</strong> &ndash; ${esc(item.why)}<br><span class="pri-section">${esc(item.section)}</span></div>
    </li>`;
  });
  h += `</ol></div><div class="divider"></div>`;

  // Summary
  h += `<div class="sec-label">Summary for Client</div>
  <div class="summary-box"><p>${esc(r.summary || '')}</p></div>
  <div class="divider"></div>`;

  // Observed facts
  const tags = [
    f.name_contact ? (f.name_contact.startsWith('Y') ? 'Contact \u2713' : 'Contact absent') : null,
    f.work_permit && f.work_permit !== 'N' ? 'Permit: ' + f.work_permit : 'Work permit not stated',
    f.headline_present && f.headline_present.startsWith('Y') ? 'Headline \u2713' : 'No headline',
    f.core_competencies_present && f.core_competencies_present.startsWith('Y') ? 'Keywords block \u2713' : 'No keywords block',
    f.years_experience ? f.years_experience + ' yrs exp' : null,
    f.cv_length_pages ? f.cv_length_pages + ' page(s)' : null,
  ].filter(Boolean);
  const certs = (f.certifications || []).filter(c => c && c.toLowerCase() !== 'none');
  const langs = (f.languages || []).filter(l => l && l.toLowerCase() !== 'none');

  h += `<div class="sec-label">Observed Facts (Internal)</div>
  <div class="prose-block">
    <div class="fact-tags">`;
  tags.forEach(t => { h += `<span class="fact-tag">${esc(t)}</span>`; });
  h += `</div>`;
  if (certs.length) h += `<div class="fact-row"><strong>Certifications:</strong> ${esc(certs.join(', '))}</div>`;
  if (langs.length) h += `<div class="fact-row"><strong>Languages:</strong> ${esc(langs.join(', '))}</div>`;
  if (f.unexplained_gaps && f.unexplained_gaps.startsWith('Y')) {
    h += `<div class="fact-row warn-text"><strong>Unexplained gap:</strong> ${esc(f.unexplained_gaps)}</div>`;
  }
  if (f.footer_present === 'Y') {
    h += `<div class="fact-row warn-text"><strong>Footer issue:</strong> name/email repeated in page footer</div>`;
  }
  if (f.format_issues && f.format_issues.toLowerCase() !== 'none' && f.format_issues.trim() !== '') {
    h += `<div class="fact-row warn-text"><strong>Format issues:</strong> ${esc(f.format_issues)}</div>`;
  }
  h += `</div>`;

  // Diagnostics panel
  const weightCheck = dimOrder.map(k => {
    const d = r.scores[k] || {};
    const expected = parseFloat(DIM_WEIGHTS[k]) / 100;
    const returned = typeof d.weight === 'number' ? d.weight : null;
    const match = returned !== null ? Math.abs(returned - expected) < 0.001 : null;
    return { k, expected, returned, match };
  });

  h += `<button class="diag-toggle" onclick="toggleDiag()">&#9660; Show diagnostics log</button>
  <div class="diag-panel" id="diag-panel" style="display:none">`;
  h += `<div style="font-weight:600;margin-bottom:8px;color:var(--text)">DIAGNOSTICS – cv_review_generic v${esc(SKILL_VERSION)}</div>`;
  h += `<div class="diag-row"><span class="diag-key">Skill name in prompt</span><span class="diag-val">${esc(SKILL_NAME)}</span></div>`;
  h += `<div class="diag-row"><span class="diag-key">Skill version in prompt</span><span class="diag-val">${esc(SKILL_VERSION)}</span></div>`;
  h += `<div class="diag-row"><span class="diag-key">Dimensions returned by model</span><span class="diag-val">${Object.keys(r.scores || {}).length} (expected 7)</span></div>`;
  h += `<div class="diag-row"><span class="diag-key">Model reported weighted_score</span><span class="diag-val">${wsModel.toFixed(4)}</span></div>`;
  h += `<div class="diag-row"><span class="diag-key">Displayed score (recomputed locally)</span><span class="${wsDrift > 0.5 ? 'diag-warn' : 'diag-ok'}">${ws.toFixed(4)}${wsDrift > 0.5 ? ' \u26a0 drift ' + wsDrift.toFixed(4) + ' pts from model' : ' \u2713 matches model'}</span></div>`;
  if (lastUsage) {
    const cr = lastUsage.cache_read_input_tokens || 0;
    const cw = lastUsage.cache_creation_input_tokens || 0;
    const ui = lastUsage.input_tokens || 0;
    h += `<div class="diag-row"><span class="diag-key">Prompt cache (#17)</span><span class="${cr > 0 ? 'diag-ok' : 'diag-warn'}">read ${cr} / wrote ${cw} / uncached ${ui}${cr > 0 ? ' \u2713 cache hit' : ' \u26a0 no cache read'}</span></div>`;
  }
  h += `<div style="margin:8px 0 4px;font-weight:600;color:var(--text)">Weight check (returned vs expected):</div>`;
  weightCheck.forEach(({k, expected, returned, match}) => {
    const label = DIM_LABELS[k] || k;
    const status = match === null ? '<span class="diag-warn">not returned</span>'
                 : match ? `<span class="diag-ok">${returned} \u2713</span>`
                 : `<span class="diag-warn">${returned} \u26a0 expected ${expected}</span>`;
    h += `<div class="diag-row"><span class="diag-key">${esc(label)}</span>${status}</div>`;
  });
  h += `<div style="margin:8px 0 4px;font-weight:600;color:var(--text)">Raw JSON from model:</div>`;
  h += `<div style="font-size:10px;color:var(--text3);word-break:break-all">${esc(JSON.stringify(r, null, 2))}</div>`;
  h += `</div>`;

  // Copy button
  h += `<button class="btn-copy" id="btn-copy" onclick="copyResults()">Copy analysis to clipboard</button>`;

  const el = document.getElementById('results');
  el.innerHTML = h;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleDiag() {
  const panel = document.getElementById('diag-panel');
  const btn = panel.previousElementSibling;
  const visible = panel.style.display !== 'none';
  panel.style.display = visible ? 'none' : 'block';
  btn.textContent = (visible ? '\u25bc' : '\u25b2') + (visible ? ' Show diagnostics log' : ' Hide diagnostics log');
}

function copyResults() {
  if (!lastResult) return;
  const r = lastResult;
  const dimOrder = ['achievement_clarity', 'swiss_market_fit', 'financial_industry_signals', 'positioning_identity', 'structure_readability', 'language_tone', 'document_hygiene'];
  const wsComputed = dimOrder.reduce((sum, k) => {
    const d = r.scores[k] || {};
    return sum + (typeof d.score === 'number' ? d.score : 0) * (parseFloat(DIM_WEIGHTS[k]) / 100);
  }, 0);
  let t = 'CFA CV REVIEW \u2013 cv_review_generic v' + SKILL_VERSION + '\n';
  t += '='.repeat(40) + '\n\n';
  t += 'Overall Score: ' + wsComputed.toFixed(1) + '/100\n\n';
  t += 'DIMENSION SCORES\n';
  dimOrder.forEach(k => {
    t += DIM_LABELS[k] + ' (' + DIM_WEIGHTS[k] + '): ' + ((r.scores[k] || {}).score || 0) + '\n';
  });
  const triage = r.triage || {};
  if ((triage.strengths || []).length) {
    t += '\nSTRENGTHS\n';
    triage.strengths.forEach((s, i) => { t += (i+1) + '. ' + s + '\n'; });
  }
  if ((triage.weaknesses || []).length) {
    t += '\nWEAKNESSES\n';
    triage.weaknesses.forEach((s, i) => { t += (i+1) + '. ' + s + '\n'; });
  }
  t += '\nPER-DIMENSION RECOMMENDATIONS\n';
  dimOrder.forEach(k => {
    const recs = (r.scores[k] || {}).recommendations || [];
    if (!recs.length) return;
    t += '\n' + DIM_LABELS[k] + ':\n';
    recs.forEach((rec, i) => { t += '  ' + (i + 1) + '. ' + rec + '\n'; });
  });
  t += '\nPRIORITY RECOMMENDATIONS\n';
  (r.priority_recommendations || []).forEach((p, i) => {
    t += (i + 1) + '. ' + p.action + ' \u2013 ' + p.why + ' (' + p.section + ')\n';
  });
  t += '\nSUMMARY\n' + (r.summary || '') + '\n';

  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('btn-copy');
    if (btn) { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy analysis to clipboard'; btn.classList.remove('copied'); }, 2500); }
  });
}
</script>
</body>
</html>
