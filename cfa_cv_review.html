<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA CV Review – Generic</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f6f3;
    --bg3: #f0efe9;
    --text: #1a1918;
    --text2: #6b6a66;
    --text3: #9e9c97;
    --border: rgba(26,25,24,0.12);
    --border2: rgba(26,25,24,0.22);
    --radius: 10px;
    --radius-sm: 6px;
    --green: #2d7d46;
    --green-bg: #eaf3de;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --font: 'Georgia', 'Times New Roman', serif;
    --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1b1a;
      --bg2: #252421;
      --bg3: #2e2c2a;
      --text: #f0ede8;
      --text2: #a09e99;
      --text3: #706e6a;
      --border: rgba(240,237,232,0.1);
      --border2: rgba(240,237,232,0.2);
      --green: #97c459;
      --green-bg: #173404;
      --amber: #ef9f27;
      --amber-bg: #412402;
      --red: #f09595;
      --red-bg: #501313;
      --blue: #85b7eb;
      --blue-bg: #042c53;
    }
  }

  body {
    font-family: var(--sans);
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    line-height: 1.6;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  /* Header */
  .site-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .logo-block {}
  .logo-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--blue);
    background: var(--blue-bg);
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .site-title {
    font-family: var(--font);
    font-size: 24px;
    font-weight: normal;
    color: var(--text);
    line-height: 1.25;
  }
  .site-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }
  .skill-link {
    font-size: 11px;
    color: var(--text3);
    text-decoration: none;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 1px;
    margin-top: 4px;
    display: inline-block;
    white-space: nowrap;
  }
  .skill-link:hover { color: var(--text2); }

  /* API key section */
  .api-section {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .api-section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .api-row input {
    flex: 1;
    font-family: monospace;
    font-size: 13px;
    padding: 8px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .api-row input:focus { border-color: var(--text3); }
  .btn-sm {
    font-size: 12px;
    padding: 8px 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-sm:hover { background: var(--bg3); }
  .api-note {
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
    line-height: 1.5;
  }
  .api-note a { color: var(--text3); }

  /* Upload */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 1.25rem;
    position: relative;
  }
  .upload-zone:hover { background: var(--bg2); border-color: var(--text3); }
  .upload-zone.drag { background: var(--bg2); border-color: var(--text2); }
  .upload-zone.has-file { border-style: solid; border-color: var(--green); background: var(--green-bg); }
  #file-input { display: none; }
  .upload-icon { font-size: 30px; margin-bottom: 10px; }
  .upload-label { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--text2); }
  .upload-fname { font-size: 13px; font-weight: 500; color: var(--green); margin-top: 8px; }

  /* Form fields */
  .fields-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    font-size: 13px;
    padding: 9px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--text3); }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: var(--sans);
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.82; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg2);
    border: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    margin-top: 1rem;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--red-bg);
    border: 0.5px solid var(--red);
    font-size: 13px;
    color: var(--red);
    margin-top: 1rem;
    line-height: 1.6;
  }

  /* Results */
  .results { margin-top: 2.5rem; }
  .sec-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }
  .divider { height: 0.5px; background: var(--border); margin: 2rem 0; }

  /* Score header */
  .score-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 1.5rem;
  }
  .score-big {
    font-family: var(--font);
    font-size: 56px;
    font-weight: normal;
    line-height: 1;
  }
  .score-meta { font-size: 13px; color: var(--text2); }
  .verdict-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }

  /* Dimension grid */
  .dim-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .dim-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .dim-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .dim-name { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.02em; }
  .dim-wt { font-size: 11px; color: var(--text3); }
  .dim-score { font-size: 26px; font-weight: 500; font-family: var(--font); }
  .dim-bar-bg { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .dim-bar { height: 3px; border-radius: 2px; }
  .dim-note { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.55; }

  /* Prose blocks */
  .prose-block {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 10px;
  }
  .prose-block h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }
  .prose-block ul { padding-left: 1.1rem; }
  .prose-block li {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 6px;
  }

  /* Priority list */
  .priority-list { list-style: none; padding: 0; }
  .priority-item { display: flex; gap: 14px; margin-bottom: 14px; }
  .pri-num {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    min-width: 22px;
    border-radius: 50%;
    background: var(--text);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    margin-top: 2px;
  }
  .pri-text { font-size: 13px; color: var(--text2); line-height: 1.65; }
  .pri-text strong { color: var(--text); font-weight: 600; }
  .pri-section { font-size: 11px; color: var(--text3); display: inline-block; margin-top: 2px; }

  /* Summary */
  .summary-box {
    border-left: 3px solid var(--border2);
    padding: 1rem 1.25rem;
    background: var(--bg2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom: 12px;
  }
  .summary-box p { font-size: 14px; color: var(--text2); line-height: 1.75; font-family: var(--font); }

  /* Facts */
  .fact-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .fact-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text2);
    border: 0.5px solid var(--border);
  }
  .fact-row { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .fact-row strong { color: var(--text); font-weight: 600; }
  .warn-text { color: var(--amber); }

  /* Copy btn */
  .btn-copy {
    font-size: 12px;
    padding: 8px 14px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    margin-top: 1.5rem;
    font-family: var(--sans);
  }
  .btn-copy:hover { background: var(--bg2); }
  .btn-copy.copied { color: var(--green); border-color: var(--green); }

  /* Color helpers */
  .c-green { color: var(--green); }
  .c-amber { color: var(--amber); }
  .c-red { color: var(--red); }
  .bar-green { background: var(--green); }
  .bar-amber { background: var(--amber); }
  .bar-red { background: var(--red); }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-red { background: var(--red-bg); color: var(--red); }

  @media (max-width: 560px) {
    .page { padding: 2rem 1rem 4rem; }
    .fields-row { grid-template-columns: 1fr; }
    .dim-grid { grid-template-columns: 1fr; }
    .site-header { flex-direction: column; gap: 12px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div class="logo-block">
      <div class="logo-badge">CFA Society Switzerland &middot; Careers Committee</div>
      <h1 class="site-title">CV Review &ndash; Generic</h1>
      <p class="site-sub">Six-dimension analysis calibrated to Swiss financial industry norms</p>
    </div>
    <div style="text-align:right;margin-top:4px;">
      <a class="skill-link" href="https://github.com/Amarows/cfa_skills/blob/main/skills/cv_review_generic/SKILL.md" target="_blank">SKILL.md &rarr;</a>
    </div>
  </header>

  <!-- Access Password -->
  <div class="api-section">
    <div class="api-section-title">Access Password</div>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="Enter password" autocomplete="off">
      <button class="btn-sm" onclick="toggleKey()">Show</button>
    </div>
    <p class="api-note">Contact the Careers Committee for access.</p>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">&#128196;</div>
    <div class="upload-label">Drop CV here or click to browse</div>
    <div class="upload-sub">PDF &middot; DOCX &middot; max 10 MB</div>
    <div class="upload-fname" id="upload-fname" style="display:none"></div>
    <input type="file" id="file-input" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
  </div>

  <!-- Optional fields -->
  <div class="fields-row">
    <div class="field">
      <label>Client&rsquo;s stated goal (optional)</label>
      <input type="text" id="client-goal" placeholder="e.g., exploring risk or quant roles">
    </div>
    <div class="field">
      <label>Seniority level (optional)</label>
      <select id="seniority">
        <option value="">Not specified</option>
        <option value="Analyst">Analyst</option>
        <option value="Associate / VP">Associate / VP</option>
        <option value="Director">Director</option>
        <option value="Managing Director">Managing Director</option>
      </select>
    </div>
  </div>

  <button class="btn-primary" id="btn-analyze" disabled onclick="runReview()">Analyse CV</button>

  <div class="status-bar" id="status-bar" style="display:none">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Extracting observed facts&hellip;</span>
  </div>
  <div class="error-msg" id="error-msg" style="display:none"></div>

  <div class="results" id="results" style="display:none"></div>

</div>

<script>
const SYSTEM_PROMPT = `You are a senior member of the CFA Society Switzerland Careers Committee conducting a structured CV review using the cv_review_generic skill.

Follow all five steps exactly:

STEP 1 – OBSERVED FACTS (internal only, populate the observed_facts JSON block):
Extract: name/contact present (Y/N), work permit stated (Y/N + value), languages with proficiency, certifications, estimated years of experience, number of roles, CV length in pages, format issues (text boxes, graphics, tables used for layout).

STEP 2 – SCORING (0–100 per dimension, exact weights):
1. Achievement Clarity – 25%: 80-100 = majority of roles quantified; 50-79 = mixed; 0-49 = duty-based only.
2. Swiss Market Fit – 20%: +20 pts each for work permit stated, languages with levels, Swiss employer/regulatory context, Swiss location, DOB/nationality removed.
3. Financial Industry Signals – 20%: +25 pts each for certifications (CFA/FRM/CAIA/CIIA/AZEK/PRM, max 50), financial products/asset classes/regulatory frameworks named, industry tools named (Bloomberg, Murex, Calypso, etc.).
4. Relevance Breadth – 15%: coherent professional identity, targeted headline/summary.
5. Structure and Readability – 10%: reverse chronological, consistent dates, appropriate length, no text boxes/tables/graphics.
6. Language and Tone – 10%: action verbs, no first-person pronouns, no grammar errors, no "References available".

STEP 3 – Per-dimension commentary: 1-2 sentences on strengths + 2-3 specific actionable recommendations each referencing a specific CV section.

STEP 4 – Top 3 priority recommendations ranked by expected impact on interview conversion.

STEP 5 – 3-5 sentence client-ready summary, constructive and professional.

CRITICAL: Respond ONLY with a valid JSON object. No markdown fences. No preamble. Exact schema:

{
  "observed_facts": {
    "name_contact": "",
    "work_permit": "",
    "languages": [],
    "certifications": [],
    "years_experience": "",
    "num_roles": 0,
    "cv_length_pages": "",
    "format_issues": ""
  },
  "scores": {
    "achievement_clarity": { "score": 0, "weight": 0.25, "strengths": "", "recommendations": [] },
    "swiss_market_fit": { "score": 0, "weight": 0.20, "strengths": "", "recommendations": [] },
    "financial_industry_signals": { "score": 0, "weight": 0.20, "strengths": "", "recommendations": [] },
    "relevance_breadth": { "score": 0, "weight": 0.15, "strengths": "", "recommendations": [] },
    "structure_readability": { "score": 0, "weight": 0.10, "strengths": "", "recommendations": [] },
    "language_tone": { "score": 0, "weight": 0.10, "strengths": "", "recommendations": [] }
  },
  "weighted_score": 0.0,
  "priority_recommendations": [
    { "action": "", "why": "", "section": "" },
    { "action": "", "why": "", "section": "" },
    { "action": "", "why": "", "section": "" }
  ],
  "summary": ""
}`;

// Password → API key map.
// Key is stored split+reversed to avoid secret scanning on public repo.
// To rotate: reverse the new key, split at midpoint, update _a and _b.
function _dk(a, b) { return (a + b).split('').reverse().join(''); }
const ACCESS_KEYS = {
  'cfa': _dk('AAwKbqd3-QyhDztxRwX4-4foSj6KJc9xxfrmPrASjxkXCdAGHCW_DY', 'dj1ZfK6KJmLiSaV1XXFBTRTUAdGX2gcEKCGmvKgGB-30ipa-tna-ks')
};

let cvBase64 = null;
let cvMediaType = null;
let cvTextContent = null; // extracted text for DOCX files
let lastResult = null;

const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');
const btnAnalyze = document.getElementById('btn-analyze');

function toggleKey() {
  const inp = document.getElementById('api-key');
  const btn = event.target;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  clearError();
  if (file.size > 10 * 1024 * 1024) { showError('File exceeds 10 MB limit.'); return; }
  const isPdf = file.type === 'application/pdf' || file.name.endsWith('.pdf');
  const isDocx = file.name.endsWith('.docx') || file.type.includes('wordprocessingml');
  if (!isPdf && !isDocx) { showError('Only PDF and DOCX files are accepted.'); return; }

  // Reset previous state
  cvBase64 = null;
  cvMediaType = null;
  cvTextContent = null;

  const reader = new FileReader();

  if (isPdf) {
    cvMediaType = 'application/pdf';
    reader.onload = e => {
      cvBase64 = e.target.result.split(',')[1];
      setFileUploaded(file);
    };
    reader.readAsDataURL(file);
  } else {
    // DOCX: extract text via mammoth, send as plain text to API
    reader.onload = e => {
      const arrayBuffer = e.target.result;
      mammoth.extractRawText({ arrayBuffer })
        .then(result => {
          if (!result.value || result.value.trim().length < 50) {
            showError('Could not extract text from this DOCX file. Please try converting to PDF.');
            return;
          }
          cvTextContent = result.value;
          setFileUploaded(file);
        })
        .catch(err => {
          showError('Failed to read DOCX: ' + esc(err.message) + '. Try converting to PDF.');
        });
    };
    reader.readAsArrayBuffer(file);
  }
}

function setFileUploaded(file) {
  uploadZone.classList.add('has-file');
  const fname = document.getElementById('upload-fname');
  fname.style.display = 'block';
  fname.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
  updateBtn();
}

document.getElementById('api-key').addEventListener('input', updateBtn);

function updateBtn() {
  const entered = document.getElementById('api-key').value.trim();
  const hasFile = !!(cvBase64 || cvTextContent);
  btnAnalyze.disabled = !(entered && hasFile);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.innerHTML = msg;
  el.style.display = 'block';
}
function clearError() {
  const el = document.getElementById('error-msg');
  el.style.display = 'none';
}

function setStatus(msg, loading = true) {
  const bar = document.getElementById('status-bar');
  bar.style.display = 'flex';
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
  document.getElementById('status-text').textContent = msg;
}

const DIM_LABELS = {
  achievement_clarity: 'Achievement Clarity',
  swiss_market_fit: 'Swiss Market Fit',
  financial_industry_signals: 'Financial Industry Signals',
  relevance_breadth: 'Relevance Breadth',
  structure_readability: 'Structure and Readability',
  language_tone: 'Language and Tone'
};

const DIM_WEIGHTS = {
  achievement_clarity: '25%', swiss_market_fit: '20%', financial_industry_signals: '20%',
  relevance_breadth: '15%', structure_readability: '10%', language_tone: '10%'
};

const PHASES = [
  'Extracting observed facts from CV\u2026',
  'Scoring six dimensions\u2026',
  'Generating per-dimension recommendations\u2026',
  'Composing priority actions and summary\u2026'
];

async function runReview() {
  const entered = document.getElementById('api-key').value.trim();
  const apiKey = ACCESS_KEYS[entered];
  if (!apiKey) { showError('Incorrect password.'); return; }
  if (!cvBase64 && !cvTextContent) return;
  clearError();
  btnAnalyze.disabled = true;
  document.getElementById('results').style.display = 'none';

  const goal = document.getElementById('client-goal').value.trim();
  const seniority = document.getElementById('seniority').value;
  const ctx = [goal ? 'Client stated goal: ' + goal + '.' : '', seniority ? 'Seniority level: ' + seniority + '.' : ''].filter(Boolean).join(' ');

  let phaseIdx = 0;
  setStatus(PHASES[0]);
  const phaseTimer = setInterval(() => {
    phaseIdx = (phaseIdx + 1) % PHASES.length;
    setStatus(PHASES[phaseIdx]);
  }, 4000);

  try {
    // Build content block: PDF uses native document type; DOCX uses extracted text
    const cvContentBlock = cvBase64
      ? { type: 'document', source: { type: 'base64', media_type: cvMediaType, data: cvBase64 } }
      : { type: 'text', text: 'CV TEXT (extracted from DOCX):\n\n' + cvTextContent };

    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2048,
      system: SYSTEM_PROMPT,
      messages: [{
        role: 'user',
        content: [
          cvContentBlock,
          {
            type: 'text',
            text: 'Please review this CV according to the cv_review_generic skill. ' + ctx + ' Return only the JSON object.'
          }
        ]
      }]
    };

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });

    clearInterval(phaseTimer);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err.error?.message || ('API error ' + res.status);
      if (res.status === 401) throw new Error('Invalid API key. Please check your key at console.anthropic.com.');
      if (res.status === 400 && msg.includes('document')) throw new Error('The file format could not be parsed by the API. Try converting to PDF and re-uploading.');
      throw new Error(msg);
    }

    const data = await res.json();
    const raw = (data.content || []).map(b => b.type === 'text' ? b.text : '').join('').trim();
    const clean = raw.replace(/^```json\s*/i, '').replace(/^```/, '').replace(/```$/, '').trim();
    const result = JSON.parse(clean);

    setStatus('Analysis complete.', false);
    renderResults(result);

  } catch (err) {
    clearInterval(phaseTimer);
    document.getElementById('status-bar').style.display = 'none';
    showError('<strong>Error:</strong> ' + esc(err.message));
    btnAnalyze.disabled = false;
  }
}

function scoreColor(s) { return s >= 70 ? 'green' : s >= 45 ? 'amber' : 'red'; }

function verdict(s) {
  if (s >= 75) return ['Strong', 'green'];
  if (s >= 60) return ['Satisfactory', 'amber'];
  if (s >= 45) return ['Needs Work', 'amber'];
  return ['Requires Significant Revision', 'red'];
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderResults(r) {
  lastResult = r;
  const ws = typeof r.weighted_score === 'number' ? r.weighted_score : 0;
  const [vLabel, vColor] = verdict(ws);
  const dimOrder = ['achievement_clarity', 'swiss_market_fit', 'financial_industry_signals', 'relevance_breadth', 'structure_readability', 'language_tone'];

  let h = '';

  // Overall score
  h += `<div class="sec-label">Overall Score</div>
  <div class="score-header">
    <div class="score-big c-${scoreColor(ws)}">${ws.toFixed(1)}</div>
    <div class="score-meta">out of 100<br><span class="verdict-pill pill-${vColor}">${esc(vLabel)}</span></div>
  </div>
  <div class="divider"></div>`;

  // Dimension grid
  h += `<div class="sec-label">Six-Dimension Breakdown</div><div class="dim-grid">`;
  dimOrder.forEach(k => {
    const d = r.scores[k] || {};
    const s = typeof d.score === 'number' ? d.score : 0;
    const c = scoreColor(s);
    h += `<div class="dim-card">
      <div class="dim-top"><span class="dim-name">${esc(DIM_LABELS[k])}</span><span class="dim-wt">${DIM_WEIGHTS[k]}</span></div>
      <div class="dim-score c-${c}">${s}</div>
      <div class="dim-bar-bg"><div class="dim-bar bar-${c}" style="width:${s}%"></div></div>
      <div class="dim-note">${esc(d.strengths || '')}</div>
    </div>`;
  });
  h += `</div><div class="divider"></div>`;

  // Per-dimension recommendations
  h += `<div class="sec-label">Per-Dimension Recommendations</div>`;
  dimOrder.forEach(k => {
    const d = r.scores[k] || {};
    const recs = Array.isArray(d.recommendations) ? d.recommendations : [];
    if (!recs.length) return;
    h += `<div class="prose-block"><h3>${esc(DIM_LABELS[k])}</h3><ul>`;
    recs.forEach(rec => { h += `<li>${esc(rec)}</li>`; });
    h += `</ul></div>`;
  });
  h += `<div class="divider"></div>`;

  // Priority recommendations
  h += `<div class="sec-label">Priority Recommendations</div><div class="prose-block"><ol class="priority-list">`;
  (r.priority_recommendations || []).forEach(item => {
    h += `<li class="priority-item">
      <div class="pri-num">${(r.priority_recommendations.indexOf(item) + 1)}</div>
      <div class="pri-text"><strong>${esc(item.action)}</strong> &ndash; ${esc(item.why)}<br><span class="pri-section">${esc(item.section)}</span></div>
    </li>`;
  });
  h += `</ol></div><div class="divider"></div>`;

  // Summary
  h += `<div class="sec-label">Summary for Client</div>
  <div class="summary-box"><p>${esc(r.summary || '')}</p></div>
  <div class="divider"></div>`;

  // Observed facts
  const f = r.observed_facts || {};
  const tags = [
    f.name_contact ? (f.name_contact.startsWith('Y') ? 'Contact present' : 'Contact absent') : null,
    f.work_permit && f.work_permit !== 'N' ? 'Permit: ' + f.work_permit : 'Work permit not stated',
    f.years_experience ? f.years_experience + ' yrs experience' : null,
    f.cv_length_pages ? f.cv_length_pages + ' page(s)' : null,
  ].filter(Boolean);
  const certs = (f.certifications || []).filter(c => c && c.toLowerCase() !== 'none');
  const langs = (f.languages || []).filter(l => l && l.toLowerCase() !== 'none');

  h += `<div class="sec-label">Observed Facts (Internal)</div>
  <div class="prose-block">
    <div class="fact-tags">`;
  tags.forEach(t => { h += `<span class="fact-tag">${esc(t)}</span>`; });
  h += `</div>`;
  if (certs.length) h += `<div class="fact-row"><strong>Certifications:</strong> ${esc(certs.join(', '))}</div>`;
  if (langs.length) h += `<div class="fact-row"><strong>Languages:</strong> ${esc(langs.join(', '))}</div>`;
  if (f.format_issues && f.format_issues.toLowerCase() !== 'none' && f.format_issues.trim() !== '') {
    h += `<div class="fact-row warn-text"><strong>Format issues:</strong> ${esc(f.format_issues)}</div>`;
  }
  h += `</div>`;

  // Copy button
  h += `<button class="btn-copy" id="btn-copy" onclick="copyResults()">Copy analysis to clipboard</button>`;

  const el = document.getElementById('results');
  el.innerHTML = h;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyResults() {
  if (!lastResult) return;
  const r = lastResult;
  const dimOrder = ['achievement_clarity', 'swiss_market_fit', 'financial_industry_signals', 'relevance_breadth', 'structure_readability', 'language_tone'];
  let t = 'CFA CV REVIEW – GENERIC\n';
  t += '='.repeat(40) + '\n\n';
  t += 'Overall Score: ' + (r.weighted_score || 0).toFixed(1) + '/100\n\n';
  t += 'DIMENSION SCORES\n';
  dimOrder.forEach(k => {
    t += DIM_LABELS[k] + ' (' + DIM_WEIGHTS[k] + '): ' + ((r.scores[k] || {}).score || 0) + '\n';
  });
  t += '\nPER-DIMENSION RECOMMENDATIONS\n';
  dimOrder.forEach(k => {
    const recs = (r.scores[k] || {}).recommendations || [];
    if (!recs.length) return;
    t += '\n' + DIM_LABELS[k] + ':\n';
    recs.forEach((rec, i) => { t += '  ' + (i + 1) + '. ' + rec + '\n'; });
  });
  t += '\nPRIORITY RECOMMENDATIONS\n';
  (r.priority_recommendations || []).forEach((p, i) => {
    t += (i + 1) + '. ' + p.action + ' – ' + p.why + ' (' + p.section + ')\n';
  });
  t += '\nSUMMARY\n' + (r.summary || '') + '\n';

  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('btn-copy');
    if (btn) { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copy analysis to clipboard'; btn.classList.remove('copied'); }, 2500); }
  });
}
</script>
